---
- name: Verify required integration variables are set
  ansible.builtin.assert:
    that:
      - netskope_tenant_url is defined
      - netskope_api_token is defined
    fail_msg: >-
      Copy tests/integration/integration_config.yml.template to
      integration_config.yml and fill in your tenant details.

- name: Integration tests for netskope_scim_info
  module_defaults:
    mlowcher61.netskope.netskope_scim_info:
      provider:
        tenant_url: "{{ netskope_tenant_url }}"
        api_token: "{{ netskope_api_token }}"
  block:
    - name: List SCIM users
      mlowcher61.netskope.netskope_scim_info:
        object_type: users
      register: users

    - name: List SCIM groups
      mlowcher61.netskope.netskope_scim_info:
        object_type: groups
      register: groups

    - name: Assert the result shapes
      ansible.builtin.assert:
        that:
          - users is not changed
          - users.resources is sequence
          - users.count == users.resources | length
          - groups is not changed
          - groups.resources is sequence
