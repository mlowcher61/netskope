---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity (${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.16
          - stable-2.17
    steps:
      - name: Check out the collection
        uses: actions/checkout@v4
        with:
          path: ansible_collections/mlowcher61/netskope

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible (${{ matrix.ansible }})
        run: python -m pip install "https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz" --disable-pip-version-check

      - name: Run sanity tests
        run: ansible-test sanity --docker -v --color
        working-directory: ansible_collections/mlowcher61/netskope

  units:
    name: Units
    runs-on: ubuntu-latest
    steps:
      - name: Check out the collection
        uses: actions/checkout@v4
        with:
          path: ansible_collections/mlowcher61/netskope

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-core
        run: python -m pip install ansible-core --disable-pip-version-check

      - name: Run unit tests
        run: ansible-test units --docker -v --color
        working-directory: ansible_collections/mlowcher61/netskope
